name: Podcast Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml requests
      - name: Compile all scripts
        run: python -c "import pathlib, py_compile; [py_compile.compile(str(p), doraise=True) for p in pathlib.Path('scripts').glob('*.py')]"
      - name: Validate config schema
        shell: bash
        run: |
          python -c "import yaml; yaml.safe_load(open('examples/config.ai-investing.yaml', encoding='utf-8'))"
      - name: Smoke test dry-run
        run: python scripts/fetch_podcasts.py --config examples/config.ai-investing.yaml --days 1 --dry-run
      - name: Smoke test local file no LLM
        run: python scripts/fetch_podcasts.py --config examples/config.ai-investing.yaml --input-file examples/sample-transcript.md --no-llm --max-items 1 --write-insight-log
      - name: Install smoke test (Linux / install.sh)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          target="$RUNNER_TEMP/pod2wiki-install-smoke"
          bash scripts/install.sh --target-dir "$target" --skip-pip --force
          python "$target/tools/pod2wiki/scripts/fetch_podcasts.py" --config "$target/config/pod2wiki.config.yaml" --env-file "$target/config/pod2wiki.env" --output-dir "$target/output/pod2wiki" --wiki-out "$target/wiki/sources" --input-file "$target/tools/pod2wiki/examples/sample-transcript.md" --no-llm --write-insight-log
          shopt -s nullglob
          matches=("$target"/wiki/sources/*-local-file-sample-ai-infrastructure-podcast.md)
          if [ ${#matches[@]} -eq 0 ]; then echo "source page missing" >&2; exit 1; fi
      - name: Install smoke test (Windows / install.ps1)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "pod2wiki-install-smoke"
          & ./scripts/install.ps1 -TargetDir $target -SkipPip -Force
          python "$target/tools/pod2wiki/scripts/fetch_podcasts.py" --config "$target/config/pod2wiki.config.yaml" --env-file "$target/config/pod2wiki.env" --output-dir "$target/output/pod2wiki" --wiki-out "$target/wiki/sources" --input-file "$target/tools/pod2wiki/examples/sample-transcript.md" --no-llm --write-insight-log
          if (-not (Get-ChildItem "$target/wiki/sources" -Filter "*-local-file-sample-ai-infrastructure-podcast.md" -ErrorAction SilentlyContinue)) { throw "source page missing" }
